# 问答策略契约
#
# 定义 Text2SQL Agent 的问答边界：
# - 什么问题可以直接回答
# - 什么问题必须先反问确认
# - 什么问题必须拒绝

# ═══════════════════════════════════════════════════════
# 可直接回答的问题类型
# ═══════════════════════════════════════════════════════
answerable:
  - domain: "traffic"
    description: "出行相关查询——行程量、车费、距离、小费"
    examples:
      - "每天多少行程？"
      - "曼哈顿的车费收入是多少？"
      - "Q1 行程量趋势？"

  - domain: "violation"
    description: "违章相关查询——罚单数量、罚款金额、违章类型分布"
    examples:
      - "每天停车罚单量？"
      - "哪种违章类型最多？"
      - "标准罚款金额最高的是哪天？"

  - domain: "safety"
    description: "事故相关查询——事故数量、伤亡统计"
    examples:
      - "每天事故数量趋势？"
      - "哪个行政区事故最多？"

  - domain: "supply"
    description: "供给相关查询——TIF 支付、司机申请"
    examples:
      - "每天 TIF 支付总额？"
      - "2026 年 Q1 多少新司机申请？"

  - domain: "asset"
    description: "资产相关查询——车辆、司机维度"
    examples:
      - "不同牌照类型各有多少车？"
      - "多少司机的牌照 2026 年到期？"

  - domain: "spatial"
    description: "空间维度查询——区域、行政区列表"
    examples:
      - "纽约市有哪些行政区？"
      - "曼哈顿有哪些出租车区域？"

# ═══════════════════════════════════════════════════════
# 必须反问的场景（歧义检测规则）
# ═══════════════════════════════════════════════════════
must_clarify:
  - trigger: "ambiguous_amount"
    description: "用户提到'金额''钱''费用'但上下文无法确定是哪种金额"
    keywords: ["金额", "钱", "费用", "收入", "多少钱", "收了"]
    ambiguity_between:
      - "total_fare_amount（车费收入）"
      - "standard_fine_total（标准罚款金额）"
      - "tif_payment_amount（TIF 支付金额）"
    clarification_template: |
      您提到的"金额"可能指以下三种，请确认您想查哪一种：
      1. 车费收入（total_fare_amount）—— 乘客支付的行程费用
      2. 标准罚款金额（standard_fine_total）—— 违章代码对应的官方罚款标准
      3. TIF 支付金额（tif_payment_amount）—— 出租车改进基金支付

  - trigger: "fuzzy_time"
    description: "时间范围模糊，无法映射到具体日期范围"
    keywords: ["最近", "近期", "上个月", "这阵子", "前段时间", "过去", "这几天"]
    clarification_template: |
      请明确您要查询的时间范围，例如：
      - "2026 年 1 月"
      - "2026 年 Q1（1-3 月）"
      - "最近 7 天"

  - trigger: "ambiguous_region"
    description: "区域/地点指代不明确"
    keywords: ["区域", "地区", "哪里", "哪个区"]
    ambiguity_between:
      - "borough（行政区：Manhattan/Brooklyn/Queens/Bronx/Staten Island）"
      - "zone（出租车区域：如 Upper East Side、JFK Airport）"
    clarification_template: |
      您说的"区域"是指：
      1. 行政区（borough）—— 如 Manhattan、Brooklyn
      2. 出租车区域（zone）—— 如 Upper East Side、JFK Airport

  - trigger: "missing_dimension"
    description: "聚合查询需要分组维度但用户未指定"
    detection: "用户要求排序/分组但未指定按什么维度"
    clarification_template: "请确认您想按什么维度分组？例如：按天、按行政区、按车辆类型。"

  - trigger: "unregistered_metric"
    description: "用户提到的指标名称不在 meta.metric_definitions 中"
    detection: "QuestionIntent 中的 metric 未匹配到注册表"
    clarification_template: "您提到的'{metric_name}'暂未在指标注册表中找到。您是否想查的是：{closest_match}？如果不是，建议通过数仓变更流程新增此指标。"

# ═══════════════════════════════════════════════════════
# 必须拒绝的问题
# ═══════════════════════════════════════════════════════
must_refuse:
  - trigger: "write_operation"
    description: "用户要求修改数据"
    examples:
      - "帮我改一下这条记录"
      - "删除异常数据"
      - "更新罚单金额"
    refusal_template: "抱歉，我是只读分析 Agent，不能修改数据。如需修改数据，请通过 TianShu 数仓变更流程提交。"

  - trigger: "bronze_direct"
    description: "用户要求直接查询原始数据层"
    refusal_template: "抱歉，Bronze/Silver 层数据未经清洗和建模，不能直接用于业务问答。请问您具体想分析什么业务问题？我可以用 Gold 层数据帮您查询。"

  - trigger: "metric_invention"
    description: "用户要求使用未注册的指标且经反问后仍不愿走变更流程"
    refusal_template: "该指标未在系统中注册，我无法编造其口径。如需新增，请通过 TianShu 数仓变更流程提交申请。"

  - trigger: "out_of_scope"
    description: "问题完全超出 TianShu 的数据范围"
    examples:
      - "今天天气怎么样？"
      - "帮我写一篇文章"
    refusal_template: "抱歉，我的能力范围是 NYC 交通数据（出行、违章、事故、司机、车辆、TIF 支付）。您的问题超出了这个范围。"
