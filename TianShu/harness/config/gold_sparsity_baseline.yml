# Gold 层字段预期稀疏基线
#
# 用途：check_gold_null.py 通过此文件区分"预期稀疏"和"不该有的 NULL"。
# 与 Silver 的 NULL 来源不同，Gold 的 NULL 主要来自：
#   1. LEFT JOIN 维表时，部分事实行找不到匹配的维度记录
#   2. 聚合函数（SUM/AVG/COUNT）在空子集上返回 NULL
#   3. CASE WHEN 派生逻辑未覆盖所有分支
#
# 维护规则：Gold 每批表建成后，运行 check_gold_null.py，
# 检查输出中标记为 [?] 的字段，将预期高缺失（>=50%）的字段补充到此列表。
# 如果某字段全 NULL 且无基线声明 100%，check_gold_null.py 会报 [!] 失败。
#
# 当前状态：Gold G0/G1 维表和 G2 明细事实表已建成。基线已覆盖已知预期稀疏字段。

baselines:
  # ─── G1 业务维表 ───
  - field: "dim_base.dba"
    expected_null_rate: 0.84
    reason: "多数基地无经营别名，属于可选业务属性"

  - field: "dim_driver.wav_trained"
    expected_null_rate: 0.50
    reason: "非无障碍车辆司机无此标记，源字段天然稀疏"

  - field: "dim_vehicle.medallion_type"
    expected_null_rate: 0.91
    reason: "仅 Medallion 类车辆有此属性"

  - field: "dim_vehicle.agent_number"
    expected_null_rate: 0.94
    reason: "仅部分车辆有代理编号"

  - field: "dim_vehicle.agent_name"
    expected_null_rate: 0.95
    reason: "仅部分车辆有代理名称"

  - field: "dim_violation_type.penalty_amount"
    expected_null_rate: 1.0
    reason: "官方数据字典 Excel 仅含标准罚款金额，不含滞纳金数据，当前无数据源"

  # ─── G2 明细事实表 ───
  - field: "fact_trips.passenger_count"
    expected_null_rate: 0.90
    reason: "FHV 和 HVFHV 行程无乘客数字段，仅 Yellow/Green 有"

  - field: "fact_trips.total_amount"
    expected_null_rate: 0.86
    reason: "FHV/HVFHV 行程无 Yellow/Green 口径 total_amount"

