# 生产级8步工作流｜3道人工审批Gate｜校验失败阻断
# 任务1：PRD解析与需求结构化
task_1_requirement_analysis:
  description: "接收业务PRD文档，解析数据源范围、业务表清单、核心业务字段、统计口径与指标计算规则，剔除模糊需求与无效字段，澄清需求冲突点，输出标准化业务需求说明书与验收条件。标注预期使用的Hive库表与HDFS数据路径。"
  expected_output: "标准化业务需求说明书，包含：Hive/HDFS数据源范围、业务表清单、指标口径字典、维度规范、计算逻辑、验收标准、需求风险评估"
  agent: requirement_agent

# 任务2：Hive/HDFS元数据校验
task_2_metadata_validation:
  description: "连接Hive Metastore与HDFS NameNode，拉取任务1中涉及的全部库表元数据与数据目录信息，逐字段校验存在性、类型对齐、分区覆盖度，标记缺失表/字段/分区路径，生成元数据校验报告。校验不通过则阻断后续流程。"
  expected_output: "元数据校验报告，包含：表存在性验证结果、字段级匹配清单、分区覆盖度检查、缺失/冲突项明细、阻断或放行判定"
  agent: metadata_agent
  context: [task_1_requirement_analysis]

# Gate 1：需求与数据源确认（人工审批点）
gate_1_requirement_data_confirm:
  description: "【人工审批Gate】请确认需求说明书与元数据校验报告：1) 数据源范围是否准确 2) 表/字段映射是否完整 3) 指标口径是否正确。审批通过后进入建模阶段。"
  expected_output: "审批通过/驳回 确认记录"
  agent: requirement_agent
  context: [task_1_requirement_analysis, task_2_metadata_validation]

# 任务3：需求-字段-表映射确认
task_3_field_mapping:
  description: "基于审批通过的需求说明书与元数据校验结果，完成业务字段到Hive物理字段的精确映射，构建字段血缘关系矩阵，明确每个指标的数据来源、计算路径、依赖表关系，输出完整的字段映射确认文档。"
  expected_output: "字段映射确认文档，包含：业务字段-物理字段映射表、字段血缘关系矩阵、指标计算路径、依赖表关系图"
  agent: requirement_agent
  context: [gate_1_requirement_data_confirm]

# 任务4：数仓分层建模
task_4_data_modeling:
  description: "基于字段映射结果与真实元数据，完成ODS原始层、DWD明细层、DWS聚合层、ADS应用层标准化分层设计，规范字段映射、数据类型适配、分区策略、存储格式（Parquet/ORC），生成可直接在Hive集群执行的建表DDL。"
  expected_output: "数仓分层设计方案、全层级Hive建表DDL、字段映射字典、分区与存储规范文档"
  agent: modeling_agent
  context: [task_3_field_mapping]

# Gate 2：模型与字段映射确认（人工审批点）
gate_2_model_confirm:
  description: "【人工审批Gate】请确认数仓分层设计方案：1) 分层路径(ODS/DWD/DWS/ADS)是否合理 2) 字段映射是否正确 3) 分区策略是否合适 4) 建表DDL是否可执行。审批通过后进入代码生成阶段。"
  expected_output: "审批通过/驳回 确认记录"
  agent: modeling_agent
  context: [task_4_data_modeling]

# 任务5：Spark作业设计与代码生成
task_5_spark_development:
  description: "基于审批通过的建模方案，生成参数化PySpark生产代码，所有表名、字段、分区通过配置参数渲染。内置数据倾斜治理、Shuffle优化、小文件合并策略，同时生成spark-submit提交脚本模板。代码需标注人工审批前不可直接提交执行。"
  expected_output: "完整PySpark生产代码（参数化配置）、spark-submit提交脚本模板、性能优化说明、代码配置参数清单"
  agent: spark_engineer_agent
  context: [gate_2_model_confirm]

# 任务6：静态检查与测试环境校验
task_6_code_quality_check:
  description: "对生成代码执行全维度静态检查：语法合法性、字段存在性（对照元数据）、类型兼容性、空值处理覆盖度、资源释放检查。校验失败则输出缺陷报告与修复建议并阻断流水线，全部通过后方可进入人工审批。"
  expected_output: "代码静态检查报告、缺陷明细清单（如有）、修复建议、通过/阻断判定"
  agent: quality_agent
  context: [task_5_spark_development]

# Gate 3：代码执行前确认（人工审批点）
gate_3_code_approval:
  description: "【人工审批Gate】请确认：1) 代码静态检查已通过 2) 代码逻辑与需求一致 3) 性能优化合理 4) 提交脚本参数正确。审批通过后代码方可进入执行或交付归档。"
  expected_output: "审批通过/驳回 确认记录"
  agent: quality_agent
  context: [task_6_code_quality_check]

# 任务7：数据质量规则与验收报告生成
task_7_quality_report:
  description: "基于PRD验收标准与真实元数据，生成数据质量校验规则（行数校验、唯一性、空值率、值域范围、业务规则符合性），输出验收SQL脚本与数据质量预期报告，供上线后数据验收使用。"
  expected_output: "数据质量规则清单、验收SQL脚本、数据质量预期报告、验收标准对照表"
  agent: quality_agent
  context: [gate_3_code_approval]

# 任务8：文档与版本归档
task_8_delivery_archive:
  description: "汇总全流程所有产出物：需求说明书、元数据校验报告、字段映射文档、建模方案、Spark代码、代码检查报告、质量规则与验收报告。生成版本化交付包与运行报告，归档至artifacts目录。"
  expected_output: "完整项目交付文档合集（含需求/元数据/建模/代码/校验/质量全流程归档）、版本记录、运行报告"
  agent: delivery_agent
  context: [task_1_requirement_analysis, task_2_metadata_validation, task_3_field_mapping, task_4_data_modeling, task_5_spark_development, task_6_code_quality_check, task_7_quality_report]
