    applies_to:
      - config/tianshu_target.yml
      - harness/checks/check_refusal_policy.py
      - AGENTS.md
    required_checks:
      - harness/checks/check_refusal_policy.py
    required_tests:
      - tests/test_c1_safety_regression.py
      - tests/test_c2_safety_regression.py
