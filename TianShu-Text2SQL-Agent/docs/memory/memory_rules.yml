# =============================================================================
# Memory Rule Registry — Text2SQL-Agent 规则单一事实源
# =============================================================================
#
# 本文件是项目中所有记忆规则的权威注册表。
# 规则编号使用 TA-Rxxx 前缀，避免与其他仓库的 R001-R0XX 冲突。
#
# ═══════════════════════════════════════════════════════════════════════════════
# 规则生命周期状态
# ═══════════════════════════════════════════════════════════════════════════════
#
# proposed   : 候选规则，不阻断任何门禁，仅用于观察和提示
# active     : 已生效规则，可用于门禁阻断（需满足晋升标准）
# deprecated : 废弃规则，不阻断但保留历史记录
# superseded : 被其他规则替代，通过 notes 字段标注替代规则编号
#
# ═══════════════════════════════════════════════════════════════════════════════
# blocking 定义
# ═══════════════════════════════════════════════════════════════════════════════
#
# blocking=false : 观察或提示模式，不阻断门禁
# blocking=true  : 可作为门禁阻断依据
#
# ═══════════════════════════════════════════════════════════════════════════════
# proposed → active 晋升标准
# ═══════════════════════════════════════════════════════════════════════════════
#
# 规则从 proposed 晋升为 active 至少需要满足以下全部条件：
#
# 1. 对应 check 已接入 fast gate warn 模式并稳定运行（连续 ≥3 次 fast gate
#    运行中该 check 未出现基础设施故障）。
# 2. 对应 pytest 至少覆盖正例和负例（即至少 1 个"应通过"和 1 个"应失败"用例）。
# 3. 对应 eval case 已存在并包含明确断言，或经团队评审确认不需要 eval（需在
#    notes 字段中注明原因和评审结论）。
# 4. 至少一次完整 fast gate 通过（所有步骤 PASS，warn checks 无 infra_fail）。
# 5. 人工审查确认无明显假阳性（审查记录需在 notes 中注明审查人和日期）。
#
# 注意：本轮（Step 5）只记录晋升标准，不实现自动晋升逻辑。所有规则默认
# proposed + blocking=false。
# 2026-06-17: TA-R018 已通过 Step 8b 人工审查，晋升为 active + blocking=true。
#
# ═══════════════════════════════════════════════════════════════════════════════
# YAML Schema
# ═══════════════════════════════════════════════════════════════════════════════
#
# 每条规则必须包含以下字段：
#
# rule_id            : string   - 规则编号，格式 TA-Rxxx（如 TA-R010）
# title              : string   - 规则标题（简短摘要）
# status             : enum     - proposed | active | deprecated | superseded
# blocking           : bool     - 是否可作为阻断依据
# severity           : enum     - high | medium | low
# source_memory      : string   - 经验来源文档及编号引用
# risk_ids           : list     - 关联风险编号（RISK-xxx）
# applies_to         : list     - 适用的源代码/配置/Prompt 文件
# required_checks    : list     - 对应的 harness 检查脚本
# required_tests     : list     - 对应的 pytest 测试文件
# required_evals     : list     - 对应的 eval 用例文件
# notes              : string   - 补充说明（可选，默认空字符串）
# =============================================================================

rules:
