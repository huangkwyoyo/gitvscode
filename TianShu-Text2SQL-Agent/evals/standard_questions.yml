questions:
  - id: standard_trip_daily_2026_01
    question_zh: "2026年1月每天有多少行程？"
    intent:
      domain: "traffic"
      metric_names: ["trip_count"]
      time_range:
        start: "2026-01-01"
        end: "2026-01-31"
      dimensions: ["date"]
    metric_names: ["trip_count"]
    expected_tables:
      - "gold.dws_daily_trip_summary"
      - "gold.dim_date"
    sql: |
      SELECT gold.dim_date.date, SUM(trip_count) AS trip_count
      FROM gold.dws_daily_trip_summary
        INNER JOIN gold.dim_date
          ON gold.dim_date.date = gold.dws_daily_trip_summary.trip_date
      WHERE gold.dim_date.date BETWEEN DATE '2026-01-01' AND DATE '2026-01-31'
      GROUP BY gold.dim_date.date
      ORDER BY gold.dim_date.date

  - id: standard_parking_daily_2026_02
    question_zh: "2026年2月每天停车罚单数量是多少？"
    intent:
      domain: "violation"
      metric_names: ["parking_violation_count"]
      time_range:
        start: "2026-02-01"
        end: "2026-02-28"
      dimensions: ["date"]
    metric_names: ["parking_violation_count"]
    expected_tables:
      - "gold.dws_daily_parking_summary"
      - "gold.dim_date"
    sql: |
      SELECT gold.dim_date.date, SUM(violation_count) AS parking_violation_count
      FROM gold.dws_daily_parking_summary
        INNER JOIN gold.dim_date
          ON gold.dim_date.date = gold.dws_daily_parking_summary.issue_date
      WHERE gold.dim_date.date BETWEEN DATE '2026-02-01' AND DATE '2026-02-28'
      GROUP BY gold.dim_date.date
      ORDER BY gold.dim_date.date

  - id: standard_crash_daily_2026_03
    question_zh: "2026年3月每天事故数是多少？"
    intent:
      domain: "safety"
      metric_names: ["crash_count"]
      time_range:
        start: "2026-03-01"
        end: "2026-03-31"
      dimensions: ["date"]
    metric_names: ["crash_count"]
    expected_tables:
      - "gold.dws_daily_crash_summary"
      - "gold.dim_date"
    sql: |
      SELECT gold.dim_date.date, SUM(crash_count) AS crash_count
      FROM gold.dws_daily_crash_summary
        INNER JOIN gold.dim_date
          ON gold.dim_date.date = gold.dws_daily_crash_summary.crash_date
      WHERE gold.dim_date.date BETWEEN DATE '2026-03-01' AND DATE '2026-03-31'
      GROUP BY gold.dim_date.date
      ORDER BY gold.dim_date.date
