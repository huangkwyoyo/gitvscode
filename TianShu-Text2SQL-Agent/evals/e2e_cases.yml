  # ═══════════════════════════════════════════════════════════════
  # 第四类：降级路径 (Downgrade) — 5 个用例
  #
  # 降级机制：当 G3 汇总表无法覆盖问题所需的维度/列时，
  #           系统必须自动降级到 G2 事实表（或 G0 维表）。
  #           关键：降级≠失败，降级后仍应生成正确的 SQL。
  #
  # 设计要点：
  #   - 使用已注册指标（不触发 ambiguity）
  #   - G3 表缺少的维度 → G2 事实表自然覆盖
  #   - JOIN 路径必须在白名单中
  #   - 必须输出 downgrade_reason
  # ═══════════════════════════════════════════════════════════════

  # ── 4.1 G3 无 zip_code → G2 fact_crashes 降级 ──
  - id: e2e_g2_crash_zip_code
    question_zh: "2026年1月各邮政编码的事故数量分别是多少？"
    expected_behavior: downgrade
    expected_tables:
      - gold.fact_crashes
      - gold.dim_date
    expected_metrics:
      - crash_count
    expected_strategy: g2_fact
    expected_downgrade_reason_contains: "G3"
    mock_intent_response: |
      {
        "domain": "safety",
        "intent_type": "aggregation",
        "metrics": ["crash_count"],
        "time_range": {
          "type": "absolute",
          "start": "2026-01-01",
          "end": "2026-01-31",
          "raw_expression": "2026年1月"
        },
        "dimensions": ["zip_code"],
        "filters": [],
        "needs_clarification": false,
        "clarification_reason": null,
        "confidence": 0.88,
        "raw_question": "2026年1月各邮政编码的事故数量分别是多少？",
        "human_review": { "requires_review": false, "flagged_fields": [], "reason": null }
      }
    mock_plan_response: |
      {
        "strategy": "g2_fact",
        "primary_table": "gold.fact_crashes",
        "joins": [
          { "table": "gold.dim_date", "on": "gold.dim_date.date_key = gold.fact_crashes.crash_date_key", "type": "INNER" }
        ],
        "where_clauses": [
          "gold.dim_date.date BETWEEN DATE '2026-01-01' AND DATE '2026-01-31'"
        ],
        "group_by": ["gold.fact_crashes.zip_code"],
        "order_by": ["gold.fact_crashes.zip_code"],
        "aggregations": [{"expr": "COUNT(*)", "alias": "crash_count"}],
        "limit": null,
        "downgrade_reason": "G3 日度汇总表 gold.dws_daily_crash_summary 不含 zip_code 维度字段，需要降级到 G2 事实表 gold.fact_crashes 获取邮政编码维度的事故明细。",
        "confidence": 0.88
      }

