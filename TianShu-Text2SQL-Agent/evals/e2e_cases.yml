# TianShu Text2SQL Agent 端到端评测用例
# 用于 harness/run_llm_e2e_eval.py
#
# 用例类型：
#   - answer: 正常回答，应走完整链路（intent → plan → SQL → 执行 → 解释）
#   - clarification: 需要反问，不应生成 SQL
#   - refusal: 应拒绝回答，不应生成 SQL

cases:
  # ═══════════════════════════════════════════════════════════
  # answer 类：正常回答
  # ═══════════════════════════════════════════════════════════

  - id: e2e_trip_daily_2026_01
    question_zh: "2026年1月每天有多少行程？"
    expected_behavior: answer
    expected_tables:
      - gold.dws_daily_trip_summary
      - gold.dim_date
    expected_metrics:
      - trip_count
    mock_intent_response: |
      {
        "domain": "traffic",
        "intent_type": "trend",
        "metrics": ["trip_count"],
        "time_range": {
          "type": "absolute",
          "start": "2026-01-01",
          "end": "2026-01-31",
          "raw_expression": "2026年1月"
        },
        "dimensions": ["date"],
        "filters": [],
        "needs_clarification": false,
        "clarification_reason": null,
        "confidence": 0.95,
        "raw_question": "2026年1月每天有多少行程？",
        "human_review": {
          "requires_review": false,
          "flagged_fields": [],
          "reason": null
        }
      }
    mock_plan_response: |
      {
        "strategy": "g3_direct",
        "primary_table": "gold.dws_daily_trip_summary",
        "joins": [
          {
            "table": "gold.dim_date",
            "on": "gold.dim_date.date = gold.dws_daily_trip_summary.trip_date",
            "type": "INNER"
          }
        ],
        "where_clauses": [
          "gold.dim_date.date BETWEEN DATE '2026-01-01' AND DATE '2026-01-31'"
        ],
        "group_by": ["gold.dim_date.date"],
        "order_by": ["gold.dim_date.date"],
        "aggregations": [
          {"expr": "SUM(trip_count)", "alias": "trip_count"}
        ],
        "limit": null,
        "downgrade_reason": null,
        "confidence": 0.95
      }

