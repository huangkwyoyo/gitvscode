# TianShu Text2SQL Agent 端到端评测用例（扩展版）
# 用于 harness/run_llm_e2e_eval.py
#
# 四类用例覆盖：
#   1. answer       — 标准查询，走完整链路（intent → plan → SQL → 执行 → 解释）
#   2. clarification — 需要反问，不应生成 SQL
#   3. refusal      — 应拒绝回答，不应生成 SQL
#   4. downgrade    — 降级路径，G3 不可用时应自动降级到 G2/G1/G0
#
# 设计原则：
#   - 使用真实 TianShu schema 中的表和指标（不虚构字段）
#   - 每类至少 3–5 个样例，覆盖边界和典型场景
#   - 所有 mock 响应符合 intent_classifier / sql_planner 的输出格式
#   - 规避 question_policy.yml 中的歧义关键词（如 金额/费用/收入/区域），
#     确保 answer/downgrade 类问题不会被误判为 clarification
#
# 已验证的真实 schema：
#   表: gold.dws_daily_trip_summary, gold.dws_daily_parking_summary,
#       gold.dws_daily_crash_summary, gold.dws_zone_trip_summary,
#       gold.dim_date, gold.dim_taxi_zone, gold.dim_violation_type,
#       gold.fact_trips, gold.fact_crashes, gold.fact_parking_violations
#   指标: trip_count, total_fare_amount, avg_distance_miles,
#         crash_count, persons_injured, persons_killed,
#         parking_violation_count, standard_fine_total
#   JOIN 白名单: fact_trips↔dim_date, fact_crashes↔dim_date,
#                fact_parking_violations↔dim_date,
#                fact_parking_violations↔dim_violation_type,
#                各 G3 表↔dim_date

cases:
  # ═══════════════════════════════════════════════════════════════
  # 第一类：标准查询 (Standard Answer) — 8 个用例
  # ═══════════════════════════════════════════════════════════════

  # ── 1.1 G3 日度行程查询 ──
  - id: e2e_trip_daily_2026_01
    question_zh: "2026年1月每天有多少行程？"
    expected_behavior: answer
    expected_tables:
      - gold.dws_daily_trip_summary
      - gold.dim_date
    expected_metrics:
      - trip_count
    mock_intent_response: |
      {
        "domain": "traffic",
        "intent_type": "trend",
        "metrics": ["trip_count"],
        "time_range": {
          "type": "absolute",
          "start": "2026-01-01",
          "end": "2026-01-31",
          "raw_expression": "2026年1月"
        },
        "dimensions": ["date"],
        "filters": [],
        "needs_clarification": false,
        "clarification_reason": null,
        "confidence": 0.95,
        "raw_question": "2026年1月每天有多少行程？",
        "human_review": { "requires_review": false, "flagged_fields": [], "reason": null }
      }
    mock_plan_response: |
      {
        "strategy": "g3_direct",
        "primary_table": "gold.dws_daily_trip_summary",
        "joins": [
          { "table": "gold.dim_date", "on": "gold.dim_date.date = gold.dws_daily_trip_summary.trip_date", "type": "INNER" }
        ],
        "where_clauses": ["gold.dim_date.date BETWEEN DATE '2026-01-01' AND DATE '2026-01-31'"],
        "group_by": ["gold.dim_date.date"],
        "order_by": ["gold.dim_date.date"],
        "aggregations": [{"expr": "SUM(trip_count)", "alias": "trip_count"}],
        "limit": null,
        "downgrade_reason": null,
        "confidence": 0.95
      }

