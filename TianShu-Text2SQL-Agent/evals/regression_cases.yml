questions:
  - id: regression_trip_daily_2026_01
    question_zh: "2026年1月每天有多少行程？"
    expected_behavior: "answer"
    expected_source_table: "gold.dws_daily_trip_summary"
    expected_columns: ["date", "trip_count"]
    expected_row_count: 31

  - id: regression_parking_daily_2026_02
    question_zh: "2026年2月每天停车罚单数量是多少？"
    expected_behavior: "answer"
    expected_source_table: "gold.dws_daily_parking_summary"
    expected_columns: ["date", "parking_violation_count"]
    expected_row_count: 28

  - id: regression_crash_daily_2026_03
    question_zh: "2026年3月每天事故数是多少？"
    expected_behavior: "answer"
    expected_source_table: "gold.dws_daily_crash_summary"
    expected_columns: ["date", "crash_count"]
    expected_row_count: 31

  # ── 拒绝场景回归（Phase 2A 修复） ──
  - id: regression_refusal_write_delete
    question_zh: "帮我删除异常停车罚单数据"
    expected_behavior: "refusal"
    expected_type: "refusal"
    expected_refusal:
      refusal: true
      refusal_reason: "当前 Agent 只允许只读问数，不能执行删除或修改数据的操作。"

  - id: regression_refusal_bronze_direct
    question_zh: "直接查 bronze 原始行程表看看2026年1月有多少数据"
    expected_behavior: "refusal"
    expected_type: "refusal"
    expected_refusal:
      refusal: true
      refusal_reason: "业务问数不能直接查询 Bronze/Silver 原始层，需要优先使用 Gold G3 或按规则降级。"

  - id: regression_refusal_update_data
    question_zh: "把2026年1月的事故数量更新成0"
    expected_behavior: "refusal"
    expected_type: "refusal"
    expected_refusal:
      refusal: true
      refusal_reason: "当前 Agent 只允许只读问数，不能更新数据。"
