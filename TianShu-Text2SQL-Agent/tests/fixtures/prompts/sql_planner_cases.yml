cases:
  - id: plan_trip_daily_2026_01
    question: "2026年1月每天有多少行程？"
    expected_type: answer
    confidence_min: 0.70
    confidence_max: 1.00
    expected_safety_status: pass
    expected_tables:
      - gold.dws_daily_trip_summary
      - gold.dim_date
    expected_fields:
      - trip_count
      - date
    input_intent:
      domain: traffic
      intent_type: trend
      metrics:
        - trip_count
      time_range:
        type: absolute
        start: "2026-01-01"
        end: "2026-01-31"
        raw_expression: "2026年1月"
      dimensions:
        - date
      filters: []
      needs_clarification: false
      clarification_reason: null
      confidence: 0.95
      raw_question: "2026年1月每天有多少行程？"
    expected_plan:
      strategy: g3_direct
      primary_table: gold.dws_daily_trip_summary
      joins:
        - table: gold.dim_date
          "on": "gold.dim_date.date = gold.dws_daily_trip_summary.trip_date"
          type: INNER
      where_clauses:
        - "gold.dim_date.date BETWEEN DATE '2026-01-01' AND DATE '2026-01-31'"
      group_by:
        - gold.dim_date.date
      order_by:
        - gold.dim_date.date
      aggregations:
        - expr: SUM(trip_count)
          alias: trip_count
      limit: null
      downgrade_reason: null
      confidence: 0.95

