# Text2SQL Agent 运行时配置
#
# 控制 Agent 的行为、模型选择和安全设置。

# ── 模型配置 ──
# provider 可选: anthropic / deepseek / openai
# DeepSeek 推荐模型: deepseek-v4-pro（推理）/ deepseek-v4-flash（轻量）
model:
  # 意图分类模型（轻量即可，结构化输出）
  intent_classifier:
    provider: "deepseek"
    model: "deepseek-v4-flash"
    temperature: 0.0
    max_tokens: 500

  # SQL 规划模型（中等推理能力）
  sql_planner:
    provider: "deepseek"
    model: "deepseek-v4-pro"
    temperature: 0.0
    max_tokens: 1000

  # SQL 生成模型（需要强 SQL 语法知识）
  sql_generator:
    provider: "deepseek"
    model: "deepseek-v4-pro"
    temperature: 0.0
    max_tokens: 500

  # 结果解释模型（自然语言生成）
  explainer:
    provider: "deepseek"
    model: "deepseek-v4-flash"
    temperature: 0.3
    max_tokens: 800

# ── 行为配置 ──
behavior:
  # 歧义检测置信度阈值：低于此值必须反问
  ambiguity_threshold: 0.85

  # 反问时最多提供的选项数
  max_clarification_options: 3

  # 明细查询默认 LIMIT（不带聚合时必须加）
  default_limit: 1000

  # 结果展示最大行数
  max_result_rows: 50

  # 是否在回答中标注数据来源表
  show_source_table: true

# ── 执行策略配置 ──
# 控制多计划场景下的执行模式
execution:
  # 是否启用并发执行（默认关闭，保持串行兼容）
  parallel_enabled: false
  # 并发执行时的最大工作线程数
  max_workers: 2

# ── 安全配置 ──
safety:
  # 必须启用只读模式（不可关闭）
  read_only: true

  # 查询超时（秒）
  query_timeout: 30

  # 禁止的 SQL 关键字（除 contracts 中定义的外，额外加强）
  extra_forbidden_keywords:
    - "PRAGMA"
    - "CHECKPOINT"

# ── 规则模式配置 ──
# B-8：规则模式定位为 PoC / 离线 fallback，不作为生产主路径。
# 关键词→指标映射在此维护，新增指标无需改代码。
# 表映射优先从 resolver context（meta.metric_definitions / contracts）动态加载。
rule_mode:
  # 关键词 → 指标名映射（用于 _detect_metric）
  keyword_to_metric:
    trip:
      keywords: ["行程", "出行", "订单", "trip"]
      metric: "trip_count"
      domain: "traffic"
    parking:
      keywords: ["停车罚单", "罚单", "违章", "parking", "violation"]
      metric: "parking_violation_count"
      domain: "violation"
    crash:
      keywords: ["事故", "碰撞", "crash", "accident"]
      metric: "crash_count"
      domain: "safety"

  # 指标 → G3 汇总表映射（离线 fallback，在线时从 resolver context 动态解析）
  metric_to_table:
    trip_count:
      table: "gold.dws_daily_trip_summary"
      date_col: "trip_date"
      value_expr: "trip_count"
    total_fare_amount:
      table: "gold.dws_daily_trip_summary"
      date_col: "trip_date"
      value_expr: "total_fare_amount"
    total_tip_amount:
      table: "gold.dws_daily_trip_summary"
      date_col: "trip_date"
      value_expr: "total_tip_amount"
    total_distance_miles:
      table: "gold.dws_daily_trip_summary"
      date_col: "trip_date"
      value_expr: "total_distance_miles"
    avg_distance_miles:
      table: "gold.dws_daily_trip_summary"
      date_col: "trip_date"
      value_expr: "avg_distance_miles"
    parking_violation_count:
      table: "gold.dws_daily_parking_summary"
      date_col: "issue_date"
      value_expr: "violation_count"
    standard_fine_total:
      table: "gold.dws_daily_parking_summary"
      date_col: "issue_date"
      value_expr: "standard_fine_total"
    crash_count:
      table: "gold.dws_daily_crash_summary"
      date_col: "crash_date"
      value_expr: "crash_count"
    persons_injured:
      table: "gold.dws_daily_crash_summary"
      date_col: "crash_date"
      value_expr: "persons_injured"
    persons_killed:
      table: "gold.dws_daily_crash_summary"
      date_col: "crash_date"
      value_expr: "persons_killed"

# ── 日志配置 ──
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(message)s"
  file: "logs/agent.log"
