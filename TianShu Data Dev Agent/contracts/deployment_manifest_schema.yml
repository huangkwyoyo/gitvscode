$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://tianshu.dev/data-dev-agent/deployment-manifest/v1"
title: "DeploymentManifest"
description: "M5a 部署清单：绑定只读转换内核与确定性写入外壳，不授予执行权限"
type: object
required:
  - request_id
  - mode
  - source_sql_ref
  - source_sql_hash
  - source_spark_ref
  - source_spark_hash
  - target_environment
  - target_table
  - write_strategy
  - partition_columns
  - sql_deploy_artifact
  - spark_deploy_artifact
  - allowed_write_schema
  - materialization_status
  - human_review_required
  - release_status
properties:
  request_id:
    type: string
    minLength: 1
  mode:
    const: MATERIALIZE
  source_sql_ref:
    const: sql/main.sql
    description: "兼容路径，同时也是 SQL 转换内核唯一权威源"
  source_sql_hash:
    type: string
    pattern: "^[0-9a-f]{64}$"
  source_spark_ref:
    const: spark/main.py
    description: "兼容路径，同时也是 Spark 转换内核唯一权威源"
  source_spark_hash:
    type: string
    pattern: "^[0-9a-f]{64}$"
  source_query_ref:
    const: sql/main.sql
    description: "旧字段兼容别名，禁止成为第二份业务逻辑源"
  source_query_hash:
    type: string
    pattern: "^[0-9a-f]{64}$"
  target_environment:
    type: string
    enum: [SANDBOX, STAGING, UNSPECIFIED]
  target_table:
    type: string
    pattern: "^generated\\.[A-Za-z_][A-Za-z0-9_]*$"
  write_strategy:
    type: string
    enum:
      - CREATE_TABLE_AS_SELECT
      - INSERT_OVERWRITE_PARTITION
      - INSERT_INTO_PARTITION
      - CREATE_VIEW
  partition_columns:
    type: array
    items:
      type: string
      minLength: 1
  sql_deploy_artifact:
    const: deploy/main.sql
  spark_deploy_artifact:
    const: deploy/main.py
  allowed_write_schema:
    const: generated
  materialization_status:
    type: string
    enum: [PENDING, RUNNING, MATERIALIZATION_VALIDATED, FAILED, CLEANUP_FAILED, SUPERSEDED]
    description: >
      M5b 物化验证状态——MATERIALIZATION_VALIDATED 是 RELEASE_APPROVED 的必要前置条件。
      CLEANUP_FAILED 优先级高于 FAILED——表示系统处于不干净状态。
      SUPERSEDED 表示制品发生变化导致旧物化验证失效——必须重新验证后才能 RELEASE_APPROVED。
      禁止使用 WARN 作为持久化状态——WARN 仅用于 overall_status 过渡态。
  unique_keys:
    type: array
    description: >
      可选的唯一键列名列表——声明后物化验证将执行实际唯一性检查。
      未声明时唯一键检查为 NOT_APPLICABLE，不阻止 PASS。
    items:
      type: string
      minLength: 1
  human_review_required:
    const: true
  release_status:
    type: string
    enum: [DRAFT, PENDING_RELEASE_REVIEW, RELEASE_APPROVED, RELEASE_REJECTED, SUPERSEDED]
  warnings:
    type: array
    items:
      type: string
  human_review_points:
    type: array
    items:
      type: string
  release_approved_by:
    type: string
    description: "发布审批人标识——仅在 RELEASE_APPROVED 时写入（如 human:username）"
  release_message:
    type: string
    description: "发布审批理由——仅在 RELEASE_APPROVED 时写入"
additionalProperties: false
